version: "3.8"

services:
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2gb
    environment:
      - SE_VNC_NO_PASSWORD=1
      - SE_SCREEN_WIDTH=1800
      - SE_SCREEN_HEIGHT=960
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    ports:
      - "4444:4444"
      - "7900:7900"   # open localhost:7900 in browser to watch tests live

  ubuntu:
    build:
      context: .
      args:
        uid: ${USER_ID:-1000}
    container_name: test-runner
    stdin_open: true
    tty: true
    volumes:
      - .:/home/selenium/project    # mounts entire project
    working_dir: /home/selenium/project
    depends_on:
      - selenium